<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>1885NY POS System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', Arial, sans-serif; background: #1a1a1a; }
  button { font-family: inherit; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="api.js"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="Printer.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="POS.jsx"></script>
<script type="text/babel" src="AdminPanel.jsx"></script>
<script type="text/babel" src="Employees.jsx"></script>
<script type="text/babel" src="Attendance.jsx"></script>
<script type="text/babel" src="Inventory.jsx"></script>
<script type="text/babel" src="Reports.jsx"></script>

<script type="text/babel">
// ── Nav items per role ───────────────────────────────────────
const NAV = [
  { id: 'pos',        label: 'POS',        icon: '🍔', roles: ['admin','manager','cashier'] },
  { id: 'inventory',  label: 'Inventory',  icon: '📦', roles: ['admin','manager'] },
  { id: 'reports',    label: 'Reports',    icon: '📊', roles: ['admin','manager'] },
  { id: 'employees',  label: 'Staff',      icon: '👥', roles: ['admin'] },
  { id: 'attendance', label: 'Attendance', icon: '🕐', roles: ['admin','manager','cashier','kitchen','delivery'] },
  { id: 'admin',      label: 'Admin',      icon: '⚙️', roles: ['admin'] },
];

// ── App Shell ────────────────────────────────────────────────
function App() {
  const { state, dispatch, apiOnline } = useApp();
  const [screen, setScreen] = React.useState('pos');
  const [clock, setClock] = React.useState(new Date());

  // Clock ticker
  React.useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  // Save screen to localStorage
  React.useEffect(() => {
    try { const s = localStorage.getItem('1885ny_pos_screen'); if (s) setScreen(s); } catch(e) {}
  }, []);
  function navigate(s) { setScreen(s); try { localStorage.setItem('1885ny_pos_screen', s); } catch(e) {} }

  if (!state.currentUser) return <Login />;

  const role = state.currentUser.role;
  const allowedNav = NAV.filter(n => n.roles.includes(role));
  // Default to first allowed if current screen not allowed
  const allowedIds = allowedNav.map(n => n.id);
  const activeScreen = allowedIds.includes(screen) ? screen : allowedIds[0];

  const timeStr = clock.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  const dateStr = clock.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });

  const ROLE_COLORS = { admin:'#ff6347', manager:'#c9921a', cashier:'#22a06b', kitchen:'#0ea5e9', delivery:'#8b5cf6' };

  return (
    <div style={shellStyles.root}>
      {/* Sidebar */}
      <div style={shellStyles.sidebar}>
        {/* Logo */}
        <div style={shellStyles.sidebarLogo}>
          <img src="/assets/logo.png" alt="1885NY" style={shellStyles.logoImg} />
        </div>

        {/* Nav items */}
        <nav style={shellStyles.nav}>
          {allowedNav.map(item => (
            <button key={item.id}
              style={{ ...shellStyles.navItem, ...(activeScreen === item.id ? shellStyles.navItemActive : {}) }}
              onClick={() => navigate(item.id)}
            >
              <span style={shellStyles.navIcon}>{item.icon}</span>
              <span style={shellStyles.navLabel}>{item.label}</span>
            </button>
          ))}
        </nav>

        {/* Bottom: user + clock */}
        <div style={shellStyles.sidebarBottom}>
          <div style={shellStyles.clockBox}>
            <div style={shellStyles.clockTime}>{timeStr}</div>
            <div style={shellStyles.clockDate}>{dateStr}</div>
          </div>
          <div style={shellStyles.userCard}>
            <div style={{...shellStyles.userDot, background: ROLE_COLORS[role]}} />
            <div style={shellStyles.userInfo}>
              <div style={shellStyles.userName}>{state.currentUser.name}</div>
              <div style={shellStyles.userRole}>{role.charAt(0).toUpperCase()+role.slice(1)}</div>
            </div>
            <button style={shellStyles.logoutBtn} title="Log out" onClick={() => dispatch({ type:'LOGOUT' })}>↩</button>
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div style={shellStyles.main}>
        {/* Top bar */}
        <div style={shellStyles.topbar}>
          <div style={shellStyles.topbarTitle}>
            {NAV.find(n => n.id === activeScreen)?.icon} {NAV.find(n => n.id === activeScreen)?.label}
          </div>
          <div style={{display:'flex', alignItems:'center', gap:12}}>
    <div style={{display:'flex', alignItems:'center', gap:5, fontFamily:'DM Sans, Arial, sans-serif', fontSize:11, fontWeight:600, color: apiOnline ? '#22a06b' : '#f59e0b'}}>
      <div style={{width:7, height:7, borderRadius:'50%', background: apiOnline ? '#22a06b' : '#f59e0b'}} />
      {apiOnline ? 'Live (API)' : 'Offline (Local)'}
    </div>
    <div style={shellStyles.topbarStore}>{state.currentStore?.name}</div>
  </div>
        </div>

        {/* Screen */}
        <div style={shellStyles.screenWrap}>
          {activeScreen === 'pos' && <POS />}
          {activeScreen === 'inventory' && <Inventory />}
          {activeScreen === 'reports' && <Reports />}
          {activeScreen === 'employees' && <Employees />}
          {activeScreen === 'attendance' && <Attendance />}
          {activeScreen === 'admin' && <AdminPanel />}
        </div>
      </div>
    </div>
  );
}

const shellStyles = {
  root: { display:'flex', height:'100vh', overflow:'hidden', background:'#f4f4f4' },

  sidebar: { width:180, background:'#1a1a1a', display:'flex', flexDirection:'column', flexShrink:0, overflowY:'auto' },
  sidebarLogo: { padding:'16px 12px 10px', borderBottom:'1px solid rgba(255,255,255,0.08)' },
  logoImg: { width:'100%', height:'auto', maxHeight:52, objectFit:'contain' },

  nav: { flex:1, padding:'10px 8px', display:'flex', flexDirection:'column', gap:2 },
  navItem: { display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:8, border:'none', background:'transparent', color:'rgba(255,255,255,0.5)', cursor:'pointer', fontFamily:'DM Sans, Arial, sans-serif', fontWeight:600, fontSize:13, textAlign:'left', transition:'all 0.15s' },
  navItemActive: { background:'#ff6347', color:'#fff' },
  navIcon: { fontSize:16, width:20, textAlign:'center', flexShrink:0 },
  navLabel: {},

  sidebarBottom: { padding:'10px 8px', borderTop:'1px solid rgba(255,255,255,0.08)' },
  clockBox: { padding:'8px 12px 12px', textAlign:'center' },
  clockTime: { fontFamily:'DM Mono, monospace', fontSize:20, color:'#fff', fontWeight:500 },
  clockDate: { fontFamily:'DM Sans, Arial, sans-serif', fontSize:11, color:'rgba(255,255,255,0.4)', marginTop:2 },
  userCard: { display:'flex', alignItems:'center', gap:8, padding:'10px 12px', background:'rgba(255,255,255,0.06)', borderRadius:8 },
  userDot: { width:8, height:8, borderRadius:'50%', flexShrink:0 },
  userInfo: { flex:1, minWidth:0 },
  userName: { fontFamily:'DM Sans, Arial, sans-serif', fontWeight:700, fontSize:12, color:'#fff', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' },
  userRole: { fontFamily:'DM Sans, Arial, sans-serif', fontSize:10, color:'rgba(255,255,255,0.4)', marginTop:1 },
  logoutBtn: { background:'rgba(255,255,255,0.1)', border:'none', borderRadius:5, padding:'5px 8px', color:'rgba(255,255,255,0.5)', cursor:'pointer', fontSize:14, flexShrink:0 },

  main: { flex:1, display:'flex', flexDirection:'column', overflow:'hidden' },
  topbar: { background:'#fff', borderBottom:'1px solid #e8e8e8', padding:'0 20px', height:50, display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 },
  topbarTitle: { fontFamily:'Anton, sans-serif', fontSize:18, color:'#1a1a1a', letterSpacing:'0.02em' },
  topbarStore: { fontFamily:'DM Sans, Arial, sans-serif', fontSize:12, color:'#888', fontWeight:600 },
  screenWrap: { flex:1, overflow:'hidden', display:'flex', flexDirection:'column' },
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App /></AppProvider>
);
</script>
</body>
</html>
