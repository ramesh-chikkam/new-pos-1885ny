// ═══════════════════════════════════════════════════════════
// CART COMPONENT
// ═══════════════════════════════════════════════════════════
function Cart({ items, onClose, onUpdateQty, onRemove, onCheckout }) {
  const subtotal = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
  const tax = subtotal * 0.05; // 5% tax
  const total = subtotal + tax;

  return (
    <div style={cartStyles.overlay} onClick={onClose}>
      <div style={cartStyles.panel} onClick={e => e.stopPropagation()}>
        <div style={cartStyles.header}>
          <h2 style={cartStyles.title}>Your Cart</h2>
          <button style={cartStyles.closeBtn} onClick={onClose}>✕</button>
        </div>

        <div style={cartStyles.items}>
          {items.length === 0 ? (
            <div style={cartStyles.empty}>Your cart is empty</div>
          ) : (
            items.map(item => (
              <div key={item.id} style={cartStyles.item}>
                <div style={cartStyles.itemInfo}>
                  <div style={cartStyles.itemName}>{item.name}</div>
                  <div style={cartStyles.itemPrice}>₹{item.price} × {item.qty}</div>
                </div>
                <div style={cartStyles.itemControls}>
                  <button
                    style={cartStyles.qtyBtn}
                    onClick={() => onUpdateQty(item.id, item.qty - 1)}
                  >−</button>
                  <span style={cartStyles.qty}>{item.qty}</span>
                  <button
                    style={cartStyles.qtyBtn}
                    onClick={() => onUpdateQty(item.id, item.qty + 1)}
                  >+</button>
                  <button
                    style={cartStyles.removeBtn}
                    onClick={() => onRemove(item.id)}
                  >🗑</button>
                </div>
              </div>
            ))
          )}
        </div>

        {items.length > 0 && (
          <div style={cartStyles.footer}>
            <div style={cartStyles.totals}>
              <div style={cartStyles.totalRow}>
                <span>Subtotal:</span>
                <span>₹{subtotal.toFixed(2)}</span>
              </div>
              <div style={cartStyles.totalRow}>
                <span>Tax (5%):</span>
                <span>₹{tax.toFixed(2)}</span>
              </div>
              <div style={{...cartStyles.totalRow, ...cartStyles.grandTotal}}>
                <span>Total:</span>
                <span>₹{total.toFixed(2)}</span>
              </div>
            </div>
            <button style={cartStyles.checkoutBtn} onClick={onCheckout}>
              Proceed to Checkout
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN APP COMPONENT
// ═══════════════════════════════════════════════════════════
function App() {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutOpen, setCheckoutOpen] = useState(false);
  const [activeCategory, setActiveCategory] = useState('All');
  const [search, setSearch] = useState('');

  // Load cart from localStorage
  useEffect(() => {
    try {
      const saved = localStorage.getItem('1885ny-cart');
      if (saved) setCart(JSON.parse(saved));
    } catch(e) {
      console.error('Failed to load cart:', e);
    }
  }, []);

  // Persist cart
  useEffect(() => {
    try {
      localStorage.setItem('1885ny-cart', JSON.stringify(cart));
    } catch(e) {
      console.error('Failed to save cart:', e);
    }
  }, [cart]);

  function addToCart(item) {
    setCart(prev => {
      const exists = prev.find(i => i.id === item.id);
      if (exists) {
        return prev.map(i => i.id === item.id ? {...i, qty: i.qty + 1} : i);
      }
      return [...prev, {...item, qty: 1}];
    });
  }

  function updateQty(id, qty) {
    if (qty <= 0) {
      removeItem(id);
      return;
    }
    setCart(prev => prev.map(i => i.id === id ? {...i, qty} : i));
  }

  function removeItem(id) {
    setCart(prev => prev.filter(i => i.id !== id));
  }

  function handleCheckout() {
    setCartOpen(false);
    setCheckoutOpen(true);
  }

  function handleOrderClose() {
    setCheckoutOpen(false);
    setCart([]);
  }

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const filtered = MENU_ITEMS.filter(item => {
    const matchCat = activeCategory === 'All' || item.category === activeCategory;
    const matchSearch = item.name.toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });

  return (
    <div>
      <Header cartCount={cartCount} onCartOpen={() => setCartOpen(true)} />

      {/* Hero Strip */}
      <div style={appStyles.hero}>
        <div style={appStyles.heroOverlay} />
        <div style={appStyles.heroContent}>
          <div style={appStyles.heroTagline}>DELICIOUS · CHEF-DRIVEN · SMASH BURGERS</div>
          <div style={appStyles.heroTitle}>Order Online</div>
          <div style={appStyles.heroSub}>Fresh, fast, smashed to perfection. Pick up at UNOS Food Market, Gachibowli.</div>
        </div>
      </div>

      {/* Filter + Search bar */}
      <div style={appStyles.filterBar}>
        <div style={appStyles.categories}>
          {CATEGORIES.map(cat => (
            <button
              key={cat}
              style={cat === activeCategory ? appStyles.catBtnActive : appStyles.catBtn}
              onClick={() => setActiveCategory(cat)}
            >
              {cat}
            </button>
          ))}
        </div>
        <div style={appStyles.searchWrap}>
          <span style={appStyles.searchIcon}>⌕</span>
          <input
            style={appStyles.searchInput}
            placeholder="Search menu..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
      </div>

      {/* Menu Grid */}
      <div style={appStyles.main}>
        {filtered.length === 0 ? (
          <div style={appStyles.emptyState}>No items found{search && ` for "${search}"`}</div>
        ) : (
          <div style={appStyles.grid}>
            {filtered.map(item => (
              <MenuCard key={item.id} item={item} onAdd={addToCart} />
            ))}
          </div>
        )}
      </div>

      {/* Footer */}
      <footer style={appStyles.footer}>
        <div style={appStyles.footerLogo}>1885<span style={{color:'#ff6347'}}>NY</span></div>
        <div style={appStyles.footerText}>UNOS Food Market, Gachibowli, Hyderabad · Telangana</div>
        <div style={appStyles.footerCopy}>© 2024 1885NY Smash Burgers. All rights reserved.</div>
      </footer>

      {cartOpen && (
        <Cart
          items={cart}
          onClose={() => setCartOpen(false)}
          onUpdateQty={updateQty}
          onRemove={removeItem}
          onCheckout={handleCheckout}
        />
      )}

      {checkoutOpen && (
        <OrderConfirm items={cart} onClose={handleOrderClose} />
      )}
    </div>
  );
}
