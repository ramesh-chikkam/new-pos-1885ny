<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin: 0; display: flex; height: 150px; overflow: hidden; font-family: 'DM Sans', sans-serif; }
.img-panel { flex: 1; overflow: hidden; position: relative; }
.img-panel img { width: 100%; height: 100%; object-fit: cover; }
.img-panel .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: flex-end; padding: 8px; }
.img-panel .caption { color: rgba(255,255,255,0.8); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head><body>
<div class="img-panel"><img src="../assets/hero-burger.jpg" alt="Hero"><div class="overlay"><span class="caption">Hero — casual, warm, ambient</span></div></div>
<div class="img-panel"><img src="../assets/burger1.jpg" alt="Classic"><div class="overlay"><span class="caption">Product — dark bg, close-up</span></div></div>
<div class="img-panel"><img src="../assets/burger2.jpg" alt="Lamb"><div class="overlay"><span class="caption">Product — warm, detailed</span></div></div>
<div class="img-panel"><img src="../assets/burger3.jpg" alt="Spicy"><div class="overlay"><span class="caption">Product — editorial</span></div></div>
</body></html>
