<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body { margin: 0; display: flex; gap: 0; font-family: Arial, sans-serif; height: 150px; }
.panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.panel-dark { background: #333; }
.panel-light { background: #f4f4f4; }
.panel-brand { background: #ff6347; }
img { max-height: 90px; width: auto; }
.logo-sm img { max-height: 48px; }
</style>
</head><body>
<div class="panel panel-dark"><img src="../assets/logo.png" alt="1885NY Logo on dark"></div>
<div class="panel panel-brand"><img src="../assets/logo.png" alt="1885NY Logo on brand"></div>
<div class="panel panel-light" style="background:#fff"><img src="../assets/logo.png" alt="1885NY Logo on light" style="filter:invert(1) sepia(1) saturate(0) brightness(0)"></div>
<div class="panel panel-light logo-sm"><img src="../assets/burger-icon.png" alt="Burger mark"></div>
</body></html>
