<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #fff; font-family: 'DM Sans', Arial, sans-serif; padding: 20px; display: flex; gap: 12px; align-items: stretch; }
.swatch { flex: 1; border-radius: 8px; overflow: hidden; }
.swatch-color { height: 80px; }
.swatch-info { padding: 8px 10px; background: #fafafa; }
.swatch-name { font-size: 11px; font-weight: 600; color: #333; }
.swatch-hex { font-size: 10px; color: #888; font-family: 'DM Mono', monospace; }
</style>
</head><body>
<div class="swatch"><div class="swatch-color" style="background:#ff8c78"></div><div class="swatch-info"><div class="swatch-name">Tomato Light</div><div class="swatch-hex">#ff8c78</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#ff6347"></div><div class="swatch-info"><div class="swatch-name">Tomato</div><div class="swatch-hex">#ff6347</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#ff4500"></div><div class="swatch-info"><div class="swatch-name">Tomato Dark</div><div class="swatch-hex">#ff4500</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#c9921a"></div><div class="swatch-info"><div class="swatch-name">Gold</div><div class="swatch-hex">#c9921a</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#e8b84b"></div><div class="swatch-info"><div class="swatch-name">Gold Light</div><div class="swatch-hex">#e8b84b</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#5c1a2a"></div><div class="swatch-info"><div class="swatch-name">Maroon</div><div class="swatch-hex">#5c1a2a</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#fff1ee"></div><div class="swatch-info"><div class="swatch-name">Tomato Pale</div><div class="swatch-hex">#fff1ee</div></div></div>
</body></html>
