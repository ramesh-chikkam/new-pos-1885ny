<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #fff; font-family: 'DM Sans', Arial, sans-serif; padding: 20px; display: flex; gap: 12px; align-items: stretch; }
.swatch { flex: 1; border-radius: 8px; overflow: hidden; }
.swatch-color { height: 80px; }
.swatch-info { padding: 8px 10px; background: #fafafa; }
.swatch-name { font-size: 11px; font-weight: 600; color: #333; }
.swatch-hex { font-size: 10px; color: #888; font-family: 'DM Mono', monospace; }
</style>
</head><body>
<div class="swatch"><div class="swatch-color" style="background:#1a1a1a"></div><div class="swatch-info"><div class="swatch-name">Near Black</div><div class="swatch-hex">#1a1a1a</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#333333"></div><div class="swatch-info"><div class="swatch-name">Charcoal</div><div class="swatch-hex">#333333</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#555555"></div><div class="swatch-info"><div class="swatch-name">Charcoal Mid</div><div class="swatch-hex">#555555</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#888888"></div><div class="swatch-info"><div class="swatch-name">Charcoal Soft</div><div class="swatch-hex">#888888</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#e0e0e0; border: 1px solid #ddd"></div><div class="swatch-info"><div class="swatch-name">Border</div><div class="swatch-hex">#e0e0e0</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#f4f4f4; border: 1px solid #eee"></div><div class="swatch-info"><div class="swatch-name">Page BG</div><div class="swatch-hex">#f4f4f4</div></div></div>
<div class="swatch"><div class="swatch-color" style="background:#ffffff; border: 1px solid #eee"></div><div class="swatch-info"><div class="swatch-name">Surface</div><div class="swatch-hex">#ffffff</div></div></div>
</body></html>
