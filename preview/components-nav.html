<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #f4f4f4; font-family: 'DM Sans', sans-serif; }
header { background: #333; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 64px; }
.logo-text { font-family: 'Anton', sans-serif; font-size: 22px; color: #fff; letter-spacing: 0.02em; }
.logo-text span { color: #ff6347; }
nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 6px; }
nav ul li a { color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 12px; border-radius: 4px; transition: color 0.15s; }
nav ul li a:hover { color: #ff6347; }
nav ul li a.active { color: #ff6347; }
.nav-cta { background: #ff6347; color: #fff; border: none; padding: 9px 18px; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
</style>
</head><body>
<header>
  <div class="logo-text">1885<span>NY</span></div>
  <nav>
    <ul>
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Locations</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>
  <button class="nav-cta">Order Now</button>
</header>
</body></html>
