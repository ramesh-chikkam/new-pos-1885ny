<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; background: #f4f4f4; padding: 20px; font-family: 'DM Sans', sans-serif; display: flex; gap: 16px; }
.menu-card { width: 200px; background: #fafafa; box-shadow: 0 4px 6px rgba(0,0,0,.10); border-radius: 10px; overflow: hidden; }
.menu-card img { width: 100%; height: 120px; object-fit: cover; }
.menu-card-body { padding: 14px; }
.menu-card-title { font-family: 'Anton', sans-serif; font-size: 18px; color: #1a1a1a; margin-bottom: 4px; }
.menu-card-desc { font-size: 12px; color: #888; line-height: 1.5; margin-bottom: 10px; }
.menu-card-footer { display: flex; justify-content: space-between; align-items: center; }
.menu-card-price { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; color: #1a1a1a; }
.btn-add { background: #ff6347; color: #fff; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
</style>
</head><body>
<div class="menu-card">
  <img src="../assets/burger1.jpg" alt="Classic Smash Burger">
  <div class="menu-card-body">
    <div class="menu-card-title">Classic Smash</div>
    <div class="menu-card-desc">Juicy beef patty with melted cheese.</div>
    <div class="menu-card-footer"><span class="menu-card-price">₹499</span><button class="btn-add">Add</button></div>
  </div>
</div>
<div class="menu-card">
  <img src="../assets/burger2.jpg" alt="Cheesy Lamb Smash">
  <div class="menu-card-body">
    <div class="menu-card-title">Cheesy Lamb</div>
    <div class="menu-card-desc">Crispy lamb and cheddar cheese.</div>
    <div class="menu-card-footer"><span class="menu-card-price">₹399</span><button class="btn-add">Add</button></div>
  </div>
</div>
<div class="menu-card">
  <img src="../assets/burger3.jpg" alt="Spicy Smash">
  <div class="menu-card-body">
    <div class="menu-card-title">Spicy Smash</div>
    <div class="menu-card-desc">Jalapeños and pepper jack cheese.</div>
    <div class="menu-card-footer"><span class="menu-card-price">₹299</span><button class="btn-add">Add</button></div>
  </div>
</div>
</body></html>
